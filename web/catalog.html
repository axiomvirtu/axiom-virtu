<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axiom Admin - Katalog</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS & Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <link href="/src/style.css" rel="stylesheet">
  </head>
  <body class="transition-colors duration-300 antialiased ">
    <div class="flex flex-col md:flex-row min-h-screen">
      <!-- Mobile Top Navbar -->
      <div class="md:hidden flex items-center justify-between p-4 border-b border-white/5 bg-[#0a0a0c]/80 backdrop-blur-md sticky top-0 z-40 w-full">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-purple-500 to-blue-500 flex items-center justify-center shadow-lg shadow-purple-500/20">
            <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          </div>
          <h1 class="text-lg font-bold bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-500 dark:from-white dark:to-gray-400">Axiom Admin</h1>
        </div>
        <button id="mobile-menu-btn" class="p-2 text-gray-400 hover:text-white rounded-lg bg-white/5">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
      <!-- Mobile Backdrop -->
      <div id="mobile-backdrop" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden md:hidden transition-opacity"></div>
      <!-- Decorative Elements -->
      <div class="fixed top-[-20%] left-[-10%] w-[500px] h-[500px] bg-purple-600/10 rounded-full blur-[120px] pointer-events-none z-0"></div>
      <div class="fixed bottom-[-20%] right-[-10%] w-[600px] h-[600px] bg-blue-600/10 rounded-full blur-[150px] pointer-events-none z-0"></div>
      
      <!-- Sidebar -->
      <aside id="sidebar" class="w-64 border-r border-gray-200 dark:border-white/5 bg-white/90 dark:bg-[#0a0a0c]/90 backdrop-blur-3xl transition-transform duration-300 fixed inset-y-0 left-0 transform -translate-x-full md:sticky md:top-0 md:h-screen flex-shrink-0 md:translate-x-0 z-50 flex flex-col h-full">
        <div class="sidebar-header p-8 flex items-center gap-3 relative">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-purple-500 to-blue-500 flex items-center justify-center shadow-lg shadow-purple-500/20">
            <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          </div>
          <h1 class="sidebar-text text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-500 dark:from-white dark:to-gray-400 flex-1 whitespace-nowrap">Axiom Admin</h1>
          <button id="desktop-menu-btn" class="hidden md:flex absolute -right-3 top-8 bg-gray-100 dark:bg-[#121215] border border-gray-200 dark:border-white/10 rounded-full p-1 text-gray-500 hover:text-gray-900 dark:hover:text-white z-50 transition-transform">
            <svg class="w-4 h-4 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
          </button>
          <button id="mobile-close-btn" class="md:hidden p-2 text-gray-500 hover:text-white">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        
        <nav class="flex-1 px-4 space-y-2 mt-4">
          <a href="/index.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-white/5 border border-transparent">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
            </svg>
            <span class="sidebar-text font-medium text-sm whitespace-nowrap">Dashboard</span>
          </a>
          <a href="/catalog.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-purple-500/10 text-purple-600 dark:text-purple-400 border border-purple-500/20 shadow-inner">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002 2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
            <span class="sidebar-text font-medium text-sm whitespace-nowrap">Manajemen Katalog</span>
          </a>
          <a href="/settings.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 dark:text-gray-400 hover:bg-white/5 border border-transparent">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span class="sidebar-text font-medium text-sm whitespace-nowrap">Pengaturan Web</span>
          </a>
        </nav>

        <div class="p-4 mt-auto border-t border-gray-200 dark:border-white/5">
          <button id="logout-btn" class="w-full flex items-center gap-3 px-4 py-3 bg-red-500/10 text-red-500 hover:bg-red-500/20 rounded-xl transition-colors font-medium text-sm">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            <span class="sidebar-text whitespace-nowrap">Logout</span>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 flex flex-col relative z-10 w-full p-4 md:p-8 ">
        <header class="mb-12">
          <h2 class="text-2xl font-bold mb-1 tracking-tight">Katalog</h2>
          <p class="text-gray-400 text-sm">Kelola produk katalog Anda.</p>
        </header>

        <!-- Top Controls -->
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-lg font-medium">Daftar Katalog Aktif</h3>
          <button id="btn-open-modal" class="px-4 py-2 bg-gradient-to-r from-purple-500 to-blue-500 hover:from-purple-600 hover:to-blue-600 rounded-lg font-medium shadow-lg shadow-purple-500/20 text-white flex items-center gap-2 transition-all text-sm">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            Tambah Katalog
          </button>
        </div>

        <!-- Table -->
        <div class="bg-white/[0.03] border border-white/5 rounded-2xl backdrop-blur-md overflow-hidden shadow-sm">
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="border-b border-white/5 bg-white/5">
                  <th class="py-4 px-6 text-sm font-medium text-gray-400">Nama Produk</th>
                  <th class="py-4 px-6 text-sm font-medium text-gray-400">Rentang Kapital (TON)</th>
                  <th class="py-4 px-6 text-sm font-medium text-gray-400">Status</th>
                  <th class="py-4 px-6 text-sm font-medium text-gray-400 text-right">Aksi</th>
                </tr>
              </thead>
              <tbody id="catalog-table-body" class="divide-y divide-white/5">
                <!-- Data will be injected via JS -->
                <tr>
                  <td colspan="4" class="py-8 text-center text-gray-500">Memuat data...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Modal Overlay -->
        
      </main>
    </div>
<div id="modal-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4">
          <!-- Modal Content -->
          <div class="bg-[#121215] border border-white/10 rounded-2xl p-6 w-full max-w-lg shadow-2xl relative max-h-[90vh] overflow-y-auto">
            <button id="btn-close-modal" class="absolute top-4 right-4 text-gray-500 hover:text-white transition-colors">
              <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
            <h3 class="text-xl font-bold mb-6">Tambah Katalog Baru</h3>
            
            <form id="form-add-catalog" class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Nama Produk</label>
                <input type="text" id="cat-name" required class="w-full px-4 py-2.5 bg-black/30 border border-white/10 rounded-xl focus:outline-none focus:border-purple-500 transition-colors text-white placeholder-gray-600" placeholder="Contoh: Bitcoin Miner V1">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Deskripsi Singkat</label>
                <textarea id="cat-desc" required rows="2" class="w-full px-4 py-2.5 bg-black/30 border border-white/10 rounded-xl focus:outline-none focus:border-purple-500 transition-colors text-white placeholder-gray-600" placeholder="Deskripsi produk..."></textarea>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-medium text-gray-400 mb-1">Min Kapital (TON)</label>
                  <input type="number" id="cat-limit-min" required min="0" class="w-full px-4 py-2.5 bg-black/30 border border-white/10 rounded-xl focus:outline-none focus:border-purple-500 transition-colors text-white placeholder-gray-600" placeholder="10">
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-400 mb-1">Max Kapital (TON)</label>
                  <input type="number" id="cat-limit-max" required min="0" class="w-full px-4 py-2.5 bg-black/30 border border-white/10 rounded-xl focus:outline-none focus:border-purple-500 transition-colors text-white placeholder-gray-600" placeholder="1000">
                </div>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Status</label>
                <select id="cat-status" class="w-full px-4 py-2.5 bg-black/30 border border-white/10 rounded-xl focus:outline-none focus:border-purple-500 transition-colors text-white">
                  <option value="active">Aktif (Tampil di App)</option>
                  <option value="inactive">Nonaktif (Draft)</option>
                </select>
              </div>
              
              <div class="pt-4 mt-6 border-t border-white/10 flex justify-end gap-3">
                <button type="button" id="btn-cancel-modal" class="px-5 py-2.5 bg-white/5 hover:bg-white/10 text-white rounded-xl font-medium transition-colors text-sm">Batal</button>
                <button type="submit" id="btn-save-catalog" class="px-5 py-2.5 bg-gradient-to-r from-purple-500 to-blue-500 hover:from-purple-600 hover:to-blue-600 text-white rounded-xl font-medium shadow-lg shadow-purple-500/20 transition-all text-sm flex items-center gap-2">
                  Simpan Katalog
                </button>
              </div>
            </form>
          </div>
        </div>
    <script type="module" src="/src/js/catalog.js"></script>
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
