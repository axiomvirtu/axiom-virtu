<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axiom Admin - Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS & Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <link href="/src/style.css" rel="stylesheet">
  </head>
  <body class="transition-colors duration-300 antialiased ">
    <div class="flex flex-col md:flex-row min-h-screen">
      <!-- Mobile Top Navbar -->
      <div class="md:hidden flex items-center justify-between p-4 border-b border-white/5 bg-[#0a0a0c]/80 backdrop-blur-md sticky top-0 z-40 w-full">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-purple-500 to-blue-500 flex items-center justify-center shadow-lg shadow-purple-500/20">
            <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          </div>
          <h1 class="text-lg font-bold bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-500 dark:from-white dark:to-gray-400">Axiom Admin</h1>
        </div>
        <button id="mobile-menu-btn" class="p-2 text-gray-400 hover:text-white rounded-lg bg-white/5">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
      <!-- Mobile Backdrop -->
      <div id="mobile-backdrop" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden md:hidden transition-opacity"></div>
      <!-- Decorative Elements -->
      <div class="fixed top-[-20%] left-[-10%] w-[500px] h-[500px] bg-purple-600/10 rounded-full blur-[120px] pointer-events-none z-0"></div>
      <div class="fixed bottom-[-20%] right-[-10%] w-[600px] h-[600px] bg-blue-600/10 rounded-full blur-[150px] pointer-events-none z-0"></div>
      
      <!-- Sidebar Placeholder (Will be loaded via JS or hardcoded) -->
      <aside id="sidebar-container" class="w-64 border-r border-gray-200 dark:border-white/5 bg-white/90 dark:bg-[#0a0a0c]/90 backdrop-blur-3xl transition-transform duration-300 fixed inset-y-0 left-0 transform -translate-x-full md:sticky md:top-0 md:h-screen flex-shrink-0 md:translate-x-0 z-50 flex flex-col h-full">
        <!-- Sidebar Content -->
        <div class="sidebar-header p-8 flex items-center gap-3 relative">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-purple-500 to-blue-500 flex items-center justify-center shadow-lg shadow-purple-500/20">
            <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          </div>
          <h1 class="sidebar-text text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-500 dark:from-white dark:to-gray-400 flex-1 whitespace-nowrap">Axiom Admin</h1>
          <button id="desktop-menu-btn" class="hidden md:flex absolute -right-3 top-8 bg-gray-100 dark:bg-[#121215] border border-gray-200 dark:border-white/10 rounded-full p-1 text-gray-500 hover:text-gray-900 dark:hover:text-white z-50 transition-transform">
            <svg class="w-4 h-4 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
          </button>
          <button id="mobile-close-btn" class="md:hidden p-2 text-gray-500 hover:text-white">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        
        <nav class="flex-1 px-4 space-y-2 mt-4">
          <a href="/" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-purple-500/10 text-purple-600 dark:text-purple-400 border border-purple-500/20 shadow-inner">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
            </svg>
            <span class="sidebar-text font-medium text-sm whitespace-nowrap">Dashboard</span>
          </a>
          <a href="/catalog.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 dark:text-gray-400 hover:bg-white/5 border border-transparent">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002 2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
            <span class="sidebar-text font-medium text-sm whitespace-nowrap">Manajemen Katalog</span>
          </a>
          <a href="/settings.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 dark:text-gray-400 hover:bg-white/5 border border-transparent">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span class="sidebar-text font-medium text-sm whitespace-nowrap">Pengaturan Web</span>
          </a>
        </nav>

        <div class="p-4 mt-auto border-t border-gray-200 dark:border-white/5">
          <button id="logout-btn" class="w-full flex items-center gap-3 px-4 py-3 bg-red-500/10 text-red-500 hover:bg-red-500/20 rounded-xl transition-colors font-medium text-sm">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            <span class="sidebar-text whitespace-nowrap">Logout</span>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 flex flex-col relative z-10 w-full p-4 md:p-8 ">
        <header class="mb-12">
          <h2 class="text-2xl font-bold mb-1 tracking-tight">Overview</h2>
          <p class="text-gray-400 text-sm">Selamat datang di Axiom Virtu Command Center.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
          <!-- Stats Card -->
          <div class="bg-white/[0.03] border border-white/5 rounded-2xl p-6 backdrop-blur-md relative overflow-hidden group shadow-sm">
            <p class="text-gray-400 text-sm font-medium mb-1 relative z-10">Total Transaksi</p>
            <h3 id="stat-transactions" class="text-3xl font-bold relative z-10">...</h3>
          </div>
          
          <div class="bg-white/[0.03] border border-white/5 rounded-2xl p-6 backdrop-blur-md relative overflow-hidden group shadow-sm">
            <p class="text-gray-400 text-sm font-medium mb-1 relative z-10">Pengguna Terdaftar</p>
            <h3 id="stat-users" class="text-3xl font-bold relative z-10">...</h3>
          </div>
          
          <div class="bg-white/[0.03] border border-white/5 rounded-2xl p-6 backdrop-blur-md relative overflow-hidden group shadow-sm">
            <p class="text-gray-400 text-sm font-medium mb-1 relative z-10">Katalog Aktif</p>
            <h3 id="stat-catalogs" class="text-3xl font-bold relative z-10">...</h3>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
